<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terasu Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 0;
    }
    header {
      grid-column: 1 / -1;
      padding: 12px 20px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #4cc9f0;
    }
    header select {
      background: #2a2a4a;
      color: #e0e0f0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }
    #run-btn {
      background: #4cc9f0;
      color: #0d0d1a;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #run-btn:hover { background: #7dd8f5; }
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a4a;
      overflow: hidden;
    }
    #editor {
      flex: 1;
      width: 100%;
      background: #1a1a2e;
      color: #e0e0f0;
      border: none;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      tab-size: 2;
    }
    #editor:focus { outline: none; }
    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #canvas {
      flex: 1;
      width: 100%;
      background: #1a1a2e;
    }
    #controls {
      padding: 8px 12px;
      background: #16162a;
      border-top: 1px solid #2a2a4a;
    }
    #error {
      color: #f72585;
      font-size: 12px;
      padding: 8px 16px;
      background: #1a0a14;
      display: none;
      grid-column: 1 / -1;
      font-family: monospace;
      white-space: pre-wrap;
    }
    #error.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>terasu</h1>
    <select id="examples">
      <option value="dipole">Electric Dipole</option>
      <option value="oscillator">Damped Oscillator</option>
      <option value="pendulum">Double Pendulum</option>
      <option value="wave">Wave Interference</option>
      <option value="lorenz">Lorenz Attractor</option>
    </select>
    <button id="run-btn">Run (⌘↵)</button>
  </header>
  <div class="editor-pane">
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="preview-pane">
    <canvas id="canvas"></canvas>
    <div id="controls"></div>
  </div>
  <div id="error"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
